<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reporting CSV URL Generator</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ece9df;
        --panel: #f8f5ec;
        --text: #1f2a35;
        --muted: #49576a;
        --accent: #0b5ea8;
        --border: #7e8fa4;
        --border-strong: #304764;
        --panel-shadow: #d1c8b5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          'Trebuchet MS',
          Verdana,
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--text);
        background:
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.12),
            rgba(255, 255, 255, 0.12) 2px,
            transparent 2px,
            transparent 4px
          ),
          linear-gradient(180deg, #f2eee3, var(--bg));
        min-height: 100vh;
      }

      .container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem 2rem;
      }

      .panel {
        background: var(--panel);
        border: 2px solid var(--border-strong);
        border-radius: 4px;
        padding: 1rem;
        box-shadow:
          0 0 0 2px var(--border),
          5px 5px 0 0 var(--panel-shadow);
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .muted {
        color: var(--muted);
      }

      .meta {
        margin-top: 0.5rem;
        display: inline-block;
        font-size: 0.8rem;
        font-family: 'Courier New', Courier, monospace;
        background: #e8eef6;
        color: #183153;
        border: 1px solid #5f7896;
        border-radius: 4px;
        padding: 0.25rem 0.5rem;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 1rem 0 0.35rem;
      }

      input,
      select {
        width: 100%;
        border: 2px solid #6f8198;
        border-radius: 4px;
        background: #fdfcf8;
        padding: 0.65rem 0.75rem;
        font-size: 1rem;
      }

      input:focus,
      select:focus {
        outline: 2px solid #1d70b8;
        outline-offset: 1px;
      }

      .help {
        margin-top: 0.3rem;
        font-size: 0.9rem;
      }

      .report-list {
        margin-top: 1rem;
        display: grid;
        gap: 0.9rem;
      }

      .report-card {
        border: 2px solid var(--border);
        border-radius: 4px;
        padding: 0.8rem;
        background: #f5f8fb;
        box-shadow: inset 0 0 0 1px #dce4ee;
      }

      .report-title {
        margin: 0 0 0.35rem;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .link-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .report-link {
        color: var(--accent);
        text-decoration: none;
        word-break: break-all;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.92rem;
      }

      .report-link:hover {
        text-decoration: underline;
      }

      button {
        border: 2px solid #355379;
        color: #f0f7ff;
        background: linear-gradient(180deg, #4b6f99, #33527a);
        border-radius: 4px;
        padding: 0.28rem 0.55rem;
        font-family: 'Trebuchet MS', Verdana, sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.06);
      }

      .error {
        color: #b10e1e;
        font-weight: 600;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>Reporting CSV URL Generator</h1>
        <p class="muted">
          Generates click-ready CSV download URLs for the most recent month, based on the current date/time.
        </p>
        <span class="meta" id="release-version"></span>

        <label for="environment">Environment</label>
        <select id="environment">
          <option value="https://accredited-programmes-manage-and-deliver-preprod.hmpps.service.justice.gov.uk/">
            Preprod
          </option>
          <option value="https://accredited-programmes-manage-and-deliver-dev.hmpps.service.justice.gov.uk/">
            Dev
          </option>
        </select>
        <p class="muted help">
          Select the target environment, then click a report link below to trigger the CSV download.
        </p>

        <p class="muted" id="date-window"></p>
        <p class="error" id="error-message" aria-live="polite"></p>

        <div class="report-list" id="report-list"></div>
      </section>
    </main>

    <script>
      ;(() => {
        const GENERATOR_VERSION = 'v1.0.0'
        const reports = [
          {
            title: 'Group size report',
            path: '/reporting/group-size.csv',
            queryParams: fromDateIso => ({ groupStartedSince: fromDateIso }),
          },
        ]

        const environmentSelect = document.getElementById('environment')
        const releaseVersion = document.getElementById('release-version')
        const dateWindow = document.getElementById('date-window')
        const errorMessage = document.getElementById('error-message')
        const reportList = document.getElementById('report-list')

        releaseVersion.textContent = `Release ${GENERATOR_VERSION}`

        const now = new Date(Date.now())
        const monthAgo = new Date(now)
        monthAgo.setMonth(monthAgo.getMonth() - 1)
        const monthAgoIso = monthAgo.toISOString()

        dateWindow.textContent = `Using data from the last month: ${monthAgoIso} to ${now.toISOString()}`

        if (window.location.protocol.startsWith('http')) {
          const currentOrigin = `${window.location.origin}/`
          const matchingOption = Array.from(environmentSelect.options).find(option => option.value === currentOrigin)
          if (matchingOption) {
            environmentSelect.value = currentOrigin
          }
        }

        const normaliseBaseUrl = rawBase => rawBase.trim().replace(/\/+$/, '')

        const tryBuildUrl = (baseUrl, report) => {
          const url = new URL(`${normaliseBaseUrl(baseUrl)}${report.path}`)
          const params = report.queryParams(monthAgoIso)
          Object.entries(params).forEach(([key, value]) => {
            url.searchParams.set(key, value)
          })
          return url.toString()
        }

        const render = () => {
          const baseUrl = environmentSelect.value
          reportList.innerHTML = ''
          errorMessage.textContent = ''

          try {
            reports.forEach(report => {
              const reportUrl = tryBuildUrl(baseUrl, report)

              const card = document.createElement('article')
              card.className = 'report-card'

              const title = document.createElement('h2')
              title.className = 'report-title'
              title.textContent = report.title
              card.appendChild(title)

              const linkRow = document.createElement('div')
              linkRow.className = 'link-row'

              const link = document.createElement('a')
              link.href = reportUrl
              link.textContent = reportUrl
              link.target = '_blank'
              link.rel = 'noopener noreferrer'
              link.className = 'report-link'
              linkRow.appendChild(link)

              const copyButton = document.createElement('button')
              copyButton.type = 'button'
              copyButton.textContent = 'Copy URL'
              copyButton.addEventListener('click', async () => {
                await navigator.clipboard.writeText(reportUrl)
                copyButton.textContent = 'Copied'
                setTimeout(() => {
                  copyButton.textContent = 'Copy URL'
                }, 1200)
              })
              linkRow.appendChild(copyButton)

              card.appendChild(linkRow)
              reportList.appendChild(card)
            })
          } catch (error) {
            errorMessage.textContent = 'Unable to build reporting URLs for the selected environment.'
          }
        }

        environmentSelect.addEventListener('change', render)
        render()
      })()
    </script>
  </body>
</html>
